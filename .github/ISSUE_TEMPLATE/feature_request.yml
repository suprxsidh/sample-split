name: Feature Request

description: Suggest an idea for this project

labels: [enhancement]

body:
  - type: markdown
    attributes:
      value: |
        ## Thanks for suggesting a new feature!

        Please describe your feature request as clearly and concisely as possible.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear and concise description of the feature you want to propose.
      placeholder: Describe the feature...
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: |
        Describe the problem this feature would solve.
        What user need does it address?
      placeholder: |
        I want to be able to...
        So that I can...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: |
        Describe the solution you'd like.
        What should happen?
      placeholder: A clear description of what you want to happen...

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: |
        Describe any alternative solutions or features you've considered.
      placeholder: Alternatives considered...

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or diagrams about the feature request here.
      placeholder: Any other information, mockups, or diagrams...
