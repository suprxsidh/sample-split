{% extends "base.html" %}

{% block title %}Admin Login - SampleSplit{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="auth-card">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock auth-icon" style="color: #ef4444;"></i>
                <h2 class="mt-2">Admin Access</h2>
                <p class="text-muted">Restricted area - authorized personnel only</p>
            </div>
            
            <form method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label">Admin Username</label>
                    <input type="text" class="form-control" id="username" name="username" required autofocus>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">Admin Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn btn-danger w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Login as Admin
                </button>
            </form>
            
            <div class="text-center mt-4">
                <a href="{{ url_for('login') }}" class="text-muted">
                    <i class="bi bi-arrow-left me-2"></i>Back to User Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
