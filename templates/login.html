{% extends "base.html" %}

{% block title %}Login - SampleSplit{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="auth-card">
            <div class="text-center mb-4">
                <i class="bi bi-wallet2 auth-icon"></i>
                <h2 class="mt-2">Welcome Back</h2>
                <p class="text-muted">Sign in to continue to SampleSplit</p>
            </div>
            
            <form method="POST" id="loginForm">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required autofocus>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100" id="submitBtn">
                    <span class="spinner-border spinner-border-sm me-2 d-none" role="status" aria-hidden="true" id="loadingSpinner"></span>
                    <i class="bi bi-box-arrow-in-right me-2" id="btnIcon"></i>
                    <span id="btnText">Login</span>
                </button>
            </form>
            
            <div class="text-center mt-4">
                <p class="mb-2">Don't have an account? <a href="{{ url_for('register') }}">Sign up</a></p>
                <p class="mb-0">
                    <a href="{{ url_for('forgot_password') }}" class="text-muted">
                        <i class="bi bi-question-circle me-1"></i>Forgot your password?
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
document.getElementById('loginForm').addEventListener('submit', function() {
    const btn = document.getElementById('submitBtn');
    const spinner = document.getElementById('loadingSpinner');
    const icon = document.getElementById('btnIcon');
    const text = document.getElementById('btnText');
    
    btn.disabled = true;
    spinner.classList.remove('d-none');
    icon.classList.add('d-none');
    text.textContent = 'Logging in...';
});
</script>
{% endblock %}
