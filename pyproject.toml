[tool.black]
line-length = 120
target-version = ['py310']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.pytest_cache
    | __pycache__
    | venv
    | instance
)/
'''

[tool.isort]
profile = "black"
line_length = 120
skip = [".git", ".pytest_cache", "__pycache__", "venv", "instance"]

[tool.flake8]
max-line-length = 120
exclude = [".git", "__pycache__", "venv", "instance", ".pytest_cache"]
ignore = ["E501"]
per-file-ignores = ["__init__.py:F401"]
