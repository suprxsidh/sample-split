{% extends "base.html" %}

{% block title %}Join Group - SampleSplit{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-box-arrow-in-right me-2"></i>Join Existing Group</h5>
            </div>
            <div class="card-body">
                <form method="POST" id="joinForm">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label for="invite_code" class="form-label">Invite Code</label>
                        <input type="text" class="form-control form-control-lg text-center" 
                               id="invite_code" name="invite_code" 
                               placeholder="000000" maxlength="6" pattern="[0-9]{6}"
                               style="letter-spacing: 0.3em; font-weight: bold;" required autofocus>
                        <small class="text-muted d-block mt-2">Enter the 6-digit code shared by your friend</small>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                            <span class="spinner-border spinner-border-sm me-2 d-none" role="status" aria-hidden="true" id="loadingSpinner"></span>
                            <i class="bi bi-people me-2" id="btnIcon"></i>
                            <span id="btnText">Join Group</span>
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center">
                <a href="{{ url_for('dashboard') }}" class="text-muted">
                    <i class="bi bi-arrow-left me-2"></i>Back to Dashboard
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
document.getElementById('joinForm').addEventListener('submit', function() {
    const btn = document.getElementById('submitBtn');
    const spinner = document.getElementById('loadingSpinner');
    const icon = document.getElementById('btnIcon');
    const text = document.getElementById('btnText');
    
    btn.disabled = true;
    spinner.classList.remove('d-none');
    icon.classList.add('d-none');
    text.textContent = 'Joining...';
});
</script>
{% endblock %}
